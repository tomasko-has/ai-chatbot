<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — Brew & Bean</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --panel-light: #1a1a26;
      --border: #26263a;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --user-grad: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.08), transparent 40%);
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      height: 80vh;
      max-height: 760px;
      animation: containerIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes containerIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header {
      padding: 18px 22px;
      background: var(--panel-light);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--user-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .status {
      font-size: 12.5px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    #chat::-webkit-scrollbar-thumb:hover { background: #333350; }

    .msg {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user {
      background: var(--user-grad);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25);
    }

    .bot {
      background: var(--panel-light);
      color: var(--text);
      align-self: flex-start;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .welcome {
      align-self: flex-start;
      color: var(--text-dim);
      font-size: 14px;
      background: var(--panel-light);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      max-width: 78%;
      animation: msgIn 0.5s ease;
    }

    .typing {
      align-self: flex-start;
      background: var(--panel-light);
      border: 1px solid var(--border);
      padding: 14px 18px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      animation: msgIn 0.3s ease;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: typingBounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 16px 18px;
      background: var(--panel-light);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    #input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    #input::placeholder { color: var(--text-dim); }

    #send {
      background: var(--user-grad);
      border: none;
      border-radius: 12px;
      padding: 0 22px;
      color: white;
      font-size: 14.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    #send:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
    }

    #send:active:not(:disabled) { transform: translateY(0); }

    #send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">&#9749;</div>
      <div class="header-info">
        <h1>Brew &amp; Bean Assistant</h1>
        <div class="status"><span class="status-dot"></span> Online — replies instantly</div>
      </div>
    </div>

    <div id="chat">
      <div class="welcome">Hi there! &#128075; I'm the virtual assistant for Brew &amp; Bean. Ask me about our opening hours, menu, or reservations.</div>
    </div>

    <div class="input-area">
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off">
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const history = [];

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const t = document.createElement("div");
      t.className = "typing";
      t.id = "typing-indicator";
      t.innerHTML = "<span></span><span></span><span></span>";
      chat.appendChild(t);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing-indicator");
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      history.push({ role: "user", content: text });
      input.value = "";
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        removeTyping();
        addMessage(data.reply, "bot");
        history.push({ role: "assistant", content: data.reply });
      } catch (err) {
        removeTyping();
        addMessage("Sorry, something went wrong. Please try again.", "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
    input.focus();
  </script>
</body>
</html>
